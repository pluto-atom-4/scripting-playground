# Sample backup configuration for WordPress sites

[global]
backup_dir=/backups
log_dir=/var/log/backup
retention_days=30
compress=true
compression_level=9

[database]
backup_type=mysqldump
backup_user=backup_user
backup_host=localhost
include_all_databases=false
single_transaction=true
quick=true

[sites]
site1=/var/www/html/site1.edu
site2=/var/www/html/site2.edu
site3=/var/www/html/site3.edu

[notifications]
send_email=true
email_to=ops@example.edu
on_failure=true
on_success=false

[pre_backup]
# Commands to run before backup
check_disk_space=true
min_disk_space_gb=100

[post_backup]
# Commands to run after backup
verify_backup=true
upload_to_s3=false
