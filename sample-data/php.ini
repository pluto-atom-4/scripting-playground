# Apache PHP configuration sample for practice
# Recommended for WordPress on LAMP stack (PHP 7.4+)

# Memory limit for PHP
memory_limit = 512M

# Maximum execution time (seconds)
max_execution_time = 300

# Maximum file upload size
upload_max_filesize = 128M
post_max_size = 128M

# Display errors (disable in production)
display_errors = Off
log_errors = On
error_log = /var/log/php-errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

# Performance tuning
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

# Database settings (mysqli recommended over deprecated mysql extension)
[mysqli]
mysqli.max_connections = 150
mysqli.connect_timeout = 10

# Session configuration
session.use_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict
session.cookie_lifetime = 3600
session.gc_maxlifetime = 7200

# Security hardening
expose_php = Off
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

# Timezone (should be set in wp-config.php)
date.timezone = America/Los_Angeles
