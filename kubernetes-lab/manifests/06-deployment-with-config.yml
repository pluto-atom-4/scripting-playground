---
# 06-deployment-with-config.yml — Deployment consuming ConfigMap + Secret
#
# Demonstrates two patterns:
#   1. Inject values as environment variables (envFrom / valueFrom)
#   2. Mount a ConfigMap entry as a file (volumeMounts)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-configured
  namespace: dev
  labels:
    app: nginx-configured
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-configured
  template:
    metadata:
      labels:
        app: nginx-configured
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80

          # Pattern 1: All keys from ConfigMap as env vars
          envFrom:
            - configMapRef:
                name: app-config

          # Pattern 2: Individual Secret keys as env vars
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD

          # Pattern 3: Mount ConfigMap entry as a file
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx-custom.conf
              readOnly: true

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: nginx-config-volume
          configMap:
            name: app-config
