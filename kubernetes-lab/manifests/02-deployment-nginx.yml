---
# 02-deployment-nginx.yml — Basic nginx Deployment
#
# A Deployment manages a set of identical Pods, handling rolling updates
# and rollbacks. This is the most common way to run stateless apps.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: dev
  labels:
    app: nginx-web
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
