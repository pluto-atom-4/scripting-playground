---
# 09-multi-pod-logging.yml — Multiple Deployments for Stern log tailing
#
# Creates three small Deployments in the dev namespace that produce
# different log patterns. Use Stern to tail all of them simultaneously
# with color-coded, multi-pod output.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: dev
  labels:
    app: api-server
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        tier: backend
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                i=$((i + 1))
                echo "[INFO] api-server request #$i processed — status=200"
                if [ $((i % 5)) -eq 0 ]; then
                  echo "[WARN] api-server slow query detected — duration=2.3s"
                fi
                if [ $((i % 12)) -eq 0 ]; then
                  echo "[ERROR] api-server connection pool exhausted — retrying"
                fi
                sleep 3
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dev
  labels:
    app: worker
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        tier: backend
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                i=$((i + 1))
                echo "[INFO] worker job #$i completed — queue_depth=3"
                if [ $((i % 7)) -eq 0 ]; then
                  echo "[ERROR] worker job #$i failed — reason=timeout"
                fi
                sleep 5
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                i=$((i + 1))
                echo "[INFO] frontend page render #$i — path=/ latency=45ms"
                if [ $((i % 8)) -eq 0 ]; then
                  echo "[WARN] frontend static asset cache miss — asset=main.js"
                fi
                sleep 4
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
