---
# 03-service-nginx.yml — Service types: ClusterIP and NodePort
#
# Services provide stable network endpoints for a set of Pods.
# ClusterIP is internal-only; NodePort exposes on every node's IP.

# ClusterIP — internal access only (default type)
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: nginx-web
  ports:
    - port: 80
      targetPort: 80
---
# NodePort — accessible from outside the cluster on port 30080
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: dev
spec:
  type: NodePort
  selector:
    app: nginx-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
