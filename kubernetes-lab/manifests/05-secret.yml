---
# 05-secret.yml — Store sensitive data (passwords, tokens, keys)
#
# Secrets are similar to ConfigMaps but intended for sensitive data.
# Values are base64-encoded (NOT encrypted by default — just encoded).
#
# In production, use external secret managers (Vault, AWS SM) or
# enable encryption at rest for the etcd datastore.
#
# base64 encode:   echo -n 'value' | base64
# base64 decode:   echo 'dmFsdWU=' | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: dev
type: Opaque
data:
  # echo -n 'wp_admin' | base64
  DB_USER: d3BfYWRtaW4=
  # echo -n 'ChangeMe_2026!' | base64
  DB_PASSWORD: Q2hhbmdlTWVfMjAyNiE=
  # echo -n 'wp_debian' | base64
  DB_NAME: d3BfZGViaWFu
