# kind-config.yml — Multi-node kind cluster for Kubernetes practice
#
# Usage:
#   kind create cluster --config kind-config.yml --name k8s-lab
#
# This creates a 3-node cluster (1 control-plane + 2 workers) that
# supports NodePort services and Ingress exercises.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # NodePort range mapped to host for direct browser access
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Ingress controller ports
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
